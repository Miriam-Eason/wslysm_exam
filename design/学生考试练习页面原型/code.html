<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f3fe; /* surface-container-low fallback */

<body class="text-on-surface antialiased min-h-screen flex flex-col items-center">

<div class="fixed top-0 w-full z-50">

<header class="bg-surface/70 dark:bg-surface-dim/70 backdrop-blur-xl fixed top-0 w-full z-50 shadow-sm border-b border-outline-variant/20">
<div class="flex justify-between items-center px-container-padding h-14 w-full max-w-max-desktop mx-auto pt-safe">
<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200 p-2 -ml-2 rounded-full focus:outline-none flex items-center gap-1">

</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-semibold text-on-surface dark:text-on-surface flex-1 text-center truncate px-4 absolute left-1/2 -translate-x-1/2">

<button class="text-primary dark:text-primary-fixed font-button-text text-button-text hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200 py-2 px-3 -mr-3 rounded-full font-semibold focus:outline-none focus:ring-2 focus:ring-primary/20">

</div>
</header>
</div>
<!-- Main Content Canvas -->
<main class="w-full max-w-max-desktop mx-auto pt-20 pb-32 px-container-padding flex-1 flex flex-col space-y-stack-gap">

<div class="flex justify-between items-center px-2">
<span class="font-body-sm text-body-sm text-secondary">第 12 / 50 题</span>
<span class="font-body-sm text-body-sm text-secondary flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="timer">timer</span> 42:15
            </span>
</div>
<!-- Exam Card -->
<div class="glass-card rounded-[24px] p-6 flex flex-col space-y-section-margin relative overflow-hidden group">

<div class="space-y-4"><div class="inline-flex items-center px-2 py-0.5 rounded-full bg-primary/5 border border-primary/10">
<span class="text-primary font-medium text-[12px] leading-none">单选</span>
</div>
<h2 class="font-headline-lg-mobile text-[20px] leading-[28px] font-semibold text-on-surface">

                </h2>
</div>
<!-- Options Form -->
<form aria-label="Exam Question Options" class="flex flex-col space-y-3 relative z-10">
<!-- Option A -->
<div class="relative">
<input class="option-input peer sr-only" id="opt-a" name="q12" type="radio"/>
<label class="option-label flex items-start gap-4 p-4 rounded-[16px] border border-outline-variant/30 cursor-pointer transition-all duration-200 hover:bg-surface-container-lowest/50 bg-surface-container-lowest/80 relative" for="opt-a">
<div class="radio-indicator flex-shrink-0 w-6 h-6 rounded-full border border-outline-variant mt-0.5 relative transition-colors duration-200"></div>
<div class="flex flex-col">
<span class="font-body-md text-body-md text-on-surface">A. 将逻辑相关的元素靠近排列，形成视觉单元。</span>
</div>
</label>
</div>
<!-- Option B -->
<div class="relative">
<input class="option-input peer sr-only" id="opt-b" name="q12" type="radio"/>

<div class="radio-indicator flex-shrink-0 w-6 h-6 rounded-full border border-outline-variant mt-0.5 relative transition-colors duration-200"></div>
<div class="flex flex-col">
<span class="font-body-md text-body-md text-on-surface">B. 在页面所有元素之间使用完全相等的间距。</span>
</div>
</label>
</div>
<!-- Option C -->
<div class="relative">
<input class="option-input peer sr-only" id="opt-c" name="q12" type="radio"/>

<div class="radio-indicator flex-shrink-0 w-6 h-6 rounded-full border border-outline-variant mt-0.5 relative transition-colors duration-200"></div>
<div class="flex flex-col">
<span class="font-body-md text-body-md text-on-surface">C. 增加背景图片的透明度以减少视觉干扰。</span>
</div>
</label>
</div>
<!-- Option D -->
<div class="relative">
<input class="option-input peer sr-only" id="opt-d" name="q12" type="radio"/>

<span class="font-body-md text-body-md text-on-surface">D. 仅使用高对比度的颜色来区分不同功能模块。</span>
</div>

<!-- Subtle decor -->
<div class="absolute -bottom-10 -right-10 w-32 h-32 bg-primary/5 rounded-full blur-2xl z-0 pointer-events-none"></div>

</button>
