# 上游：compose 内的 app 服务
upstream nextjs_upstream {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Excel 题目/学生导入等上传，放宽请求体上限
    client_max_body_size 20m;

    # 静态压缩
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css application/json
        application/javascript application/xml image/svg+xml font/woff2;

    # Next.js 带内容指纹的静态资源，可安全长缓存
    location /_next/static/ {
        proxy_pass http://nextjs_upstream;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;

        # WebSocket / 长连接透传
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 透传真实来源信息（NextAuth 回调 / Cookie 依赖 X-Forwarded-Proto）
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 75s;
    }
}

